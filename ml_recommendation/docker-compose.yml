version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:latest
    container_name: alumni_mongodb
    environment:
      MONGO_INITDB_DATABASE: aluminiconnect
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_configdb:/data/configdb
    networks:
      - alumni_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Python Recommendation API
  recommendation_api:
    build: .
    container_name: alumni_recommendation_api
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      DATABASE_NAME: aluminiconnect
      MODEL_TYPE: hybrid
      API_PORT: 5000
      API_DEBUG: "False"
    ports:
      - "5000:5000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - alumni_network
    restart: unless-stopped

  # Optional: Redis for caching
  redis:
    image: redis:latest
    container_name: alumni_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - alumni_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data:
  mongodb_configdb:
  redis_data:

networks:
  alumni_network:
    driver: bridge
